name: Build packages

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows-dx11-x64:
    name: Windows DX11 x64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-gcc
      - name: Configure
        run: cmake -S windows_dx11 -B build/windows-dx11 -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build/windows-dx11 --config Release
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/windows-dx11/portable/mandelbrot_imgui.exe -DestinationPath dist/mandelbrot-windows-dx11-x64.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: mandelbrot-windows-dx11-x64
          path: dist/mandelbrot-windows-dx11-x64.zip

  linux-glfw-x64:
    name: Linux GLFW x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev
      - name: Configure
        run: cmake -S portable_glfw -B build/linux-glfw -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build/linux-glfw --config Release
      - name: Package
        run: |
          mkdir -p dist/mandelbrot-linux-glfw-x64
          cp build/linux-glfw/mandelbrot_glfw dist/mandelbrot-linux-glfw-x64/
          tar -C dist -czf dist/mandelbrot-linux-glfw-x64.tar.gz mandelbrot-linux-glfw-x64
      - uses: actions/upload-artifact@v4
        with:
          name: mandelbrot-linux-glfw-x64
          path: dist/mandelbrot-linux-glfw-x64.tar.gz

  linux-glfw-arm64:
    name: Linux GLFW arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libglu1-mesa-dev
      - name: Configure
        run: cmake -S portable_glfw -B build/linux-glfw-arm64 -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build/linux-glfw-arm64 --config Release
      - name: Package
        run: |
          mkdir -p dist/mandelbrot-linux-glfw-arm64
          cp build/linux-glfw-arm64/mandelbrot_glfw dist/mandelbrot-linux-glfw-arm64/
          tar -C dist -czf dist/mandelbrot-linux-glfw-arm64.tar.gz mandelbrot-linux-glfw-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: mandelbrot-linux-glfw-arm64
          path: dist/mandelbrot-linux-glfw-arm64.tar.gz

  macos-glfw-arm64:
    name: macOS GLFW arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          brew list cmake >/dev/null 2>&1 || brew install cmake
          brew list ninja >/dev/null 2>&1 || brew install ninja
      - name: Configure
        run: cmake -S portable_glfw -B build/macos-arm64 -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64
      - name: Build
        run: cmake --build build/macos-arm64 --config Release
      - name: Ad-hoc sign app
        run: |
          codesign --force --deep --sign - build/macos-arm64/mandelbrot_glfw.app
          codesign --verify --deep --strict --verbose=2 build/macos-arm64/mandelbrot_glfw.app
      - name: Package
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/macos-arm64/mandelbrot_glfw.app dist/mandelbrot-macos-glfw-arm64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: mandelbrot-macos-glfw-arm64
          path: dist/mandelbrot-macos-glfw-arm64.zip

  macos-glfw-x64:
    name: macOS GLFW x64
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          brew list cmake >/dev/null 2>&1 || brew install cmake
          brew list ninja >/dev/null 2>&1 || brew install ninja
      - name: Configure
        run: cmake -S portable_glfw -B build/macos-x64 -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=x86_64
      - name: Build
        run: cmake --build build/macos-x64 --config Release
      - name: Ad-hoc sign app
        run: |
          codesign --force --deep --sign - build/macos-x64/mandelbrot_glfw.app
          codesign --verify --deep --strict --verbose=2 build/macos-x64/mandelbrot_glfw.app
      - name: Package
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/macos-x64/mandelbrot_glfw.app dist/mandelbrot-macos-glfw-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: mandelbrot-macos-glfw-x64
          path: dist/mandelbrot-macos-glfw-x64.zip

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - windows-dx11-x64
      - linux-glfw-x64
      - linux-glfw-arm64
      - macos-glfw-arm64
      - macos-glfw-x64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "Automated Mandelbrot Realtime Zoom builds."
          find artifacts -type f -print0 | xargs -0 gh release upload "$TAG_NAME" --clobber
